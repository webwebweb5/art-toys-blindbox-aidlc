version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: arttoys-postgres
    environment:
      POSTGRES_USER: arttoys
      POSTGRES_PASSWORD: arttoys_dev
      POSTGRES_DB: arttoys_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arttoys -d arttoys_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: arttoys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres_data:
    name: arttoys_postgres_data
  redis_data:
    name: arttoys_redis_data
